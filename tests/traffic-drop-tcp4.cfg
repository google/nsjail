# Test: IPv4 traffic rule that drops all outgoing TCP traffic

name: "traffic-drop-tcp4"

description: "Tests that an IPv4 DROP rule on TCP port 80 blocks traffic."

mode: ONCE

skip_setsid: true
mount_proc: true

mount {
	src: "/"
	dst: "/"
	is_bind: true
}

user_net {
	nat: true
}

traffic_rule {
	proto: TCP
	dport: 80
	action: DROP
}

exec_bin {
	path: "/bin/bash"
	arg0: "sh"
	arg: "-i"
}
