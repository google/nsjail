# Test config: NAT with IPv4 only (ip6_enabled=false)

name: "nat-ip4-only"

description: "Tests NAT mode with ip6_enabled set to false,"
description: "verifying that IPv4-only operation works correctly."

mode: ONCE
hostname: "NAT-IP4"
cwd: "/tmp"

time_limit: 100

skip_setsid: true

user_net { }

mount {
	src: "/"
	dst: "/"
	is_bind: true
	rw: false
}

exec_bin {
	path: "/bin/bash"
	arg0: "sh"
	arg: "-i"
}
