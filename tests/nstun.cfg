name: "nstun-test"
mode: ONCE
hostname: "nstun-test"

envar: "PATH=/bin:/usr/bin:/sbin:/usr/sbin"
envar: "TERM=linux"
envar: "HOME=/"
envar: "PS1=[\\H:\\t:\\s-\\V:\\w]\\$ "

clone_newnet: true
clone_newuser: true
clone_newns: true
clone_newpid: true
clone_newipc: true
clone_newuts: true

keep_caps: true
skip_setsid: true
mount_proc: true

uidmap {
	inside_id: "0"
	outside_id: ""
	count: 1
}

gidmap {
	inside_id: "0"
	outside_id: ""
	count: 1
}

user_net {
	backend: NSTUN

}

mount {
	src: "/"
	dst: "/"
	is_bind: true
}

mount {
	src_content: "nameserver 8.8.8.8\nnameserver 1.1.1.1\n"
	dst: "/etc/resolv.conf"
}

exec_bin {
	path: "/bin/bash"
	arg: "-i"
}
