name: "redirect_test"
description: "Test for TCP/UDP port redirection."

mode: ONCE

skip_setsid: true
mount_proc: true

mount {
	src: "/"
	dst: "/"
	is_bind: true
}

mount {
	src_content: "nameserver 8.8.8.8\nnameserver 1.1.1.1\n"
	dst: "/etc/resolv.conf"
}

user_net {
	backend: NSTUN

	rule4 {
		proto: ICMP
		action: REDIRECT
		redirect_ip: "127.0.0.2"
	}
	rule4 {
		proto: TCP
		dport: 53
		action: REDIRECT
		redirect_ip: "1.1.1.1"
		redirect_port: 53
	}
	rule4 {
		proto: UDP
		dport: 53
		action: REDIRECT
		redirect_ip: "1.1.1.1"
		redirect_port: 53
	}
	rule4 {
		proto: TCP
		dport: 80
		action: REDIRECT
		redirect_ip: "1.1.1.1"
		redirect_port: 80
	}
	rule6 {
		proto: UDP
		dport: 53
		action: REDIRECT
		redirect_ip: "2606:4700:4700::1111"
		redirect_port: 53
	}
	rule6 {
		proto: TCP
		dport: 53
		action: REDIRECT
		redirect_ip: "2606:4700:4700::1111"
		redirect_port: 53
	}
	rule6 {
		proto: TCP
		dport: 80
		action: REDIRECT
		redirect_ip: "2606:4700:4700::1111"
		redirect_port: 80
	}
}

exec_bin {
	path: "/bin/bash"
	arg: "-i"
}
