name: "nat-test"

mode: ONCE
hostname: "nat-test"

clone_newnet: true
clone_newuser: true
clone_newns: true
clone_newpid: true
clone_newipc: true
clone_newuts: true

keep_caps: true
skip_setsid: true

mount_proc: true

mount {
  src: "/"
  dst: "/"
  is_bind: true
}

mount {
  src_content: "nameserver 8.8.8.8\n"
  dst: "/etc/resolv.conf"
}

user_net {
  nat: true
}
