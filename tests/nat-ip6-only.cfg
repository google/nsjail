# Test config: NAT with IPv6 only (ip4_enabled=false)

name: "nat-ip6-only"

description: "Tests NAT mode with ip4_enabled set to false,"
description: "verifying that IPv6-only operation works correctly."

mode: ONCE
hostname: "NAT-IP6"
cwd: "/tmp"

time_limit: 100

skip_setsid: true

user_net {
	nat: true
	ip4_enabled: false
}

mount {
	src: "/"
	dst: "/"
	is_bind: true
	rw: false
}

exec_bin {
	path: "/bin/bash"
	arg0: "sh"
	arg: "-i"
}
