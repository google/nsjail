name: "traffic_rule"
description: "Demonstrates the highly structured TrafficRule protobuf API for firewalling and NAT."

mode: ONCE

skip_setsid: true
mount_proc: true

mount {
	src: "/"
	dst: "/"
	is_bind: true
}

user_net { }

traffic_rule {
	proto: TCP
	dport: 443
	action: DROP
}

traffic_rule {
	proto: TCP
	dport: 80
	dport_end: 85
	action: REJECT
}

exec_bin {
	path: "/bin/bash"
	arg0: "sh"
	arg: "-i"
}
