name: "traffic_rule"
description: "Demonstrates the highly structured TrafficRule protobuf API for firewalling and NAT."

mode: ONCE

skip_setsid: true
mount_proc: true

mount {
	src: "/"
	dst: "/"
	is_bind: true
}

user_net {
	nat: true
}

traffic_rule {
	proto: TCP
	dport: 443
	action: DROP
}

traffic_rule {
	proto: TCP
	dport: 80
	dport_end: 85
	action: ENCAP
	encap_type: ENCAP_IP
	encap_dst: "127.0.0.100"
	encap_id: 100
}

traffic_rule {
	ip_family: IPV6
	proto: UDP
	dport: 53
	action: ENCAP
	encap_type: ENCAP_MPLS
	encap_dst: "200"
	encap_id: 255
}

exec_bin {
	path: "/bin/bash"
	arg0: "sh"
	arg: "-i"
}
