# Test: IPv6 traffic rule that drops all outgoing UDP traffic on port 53

name: "traffic-drop-udp6"

description: "Tests that an IPv6 DROP rule on UDP port 53 is applied correctly."

mode: ONCE

skip_setsid: true
mount_proc: true

mount {
	src: "/"
	dst: "/"
	is_bind: true
}

user_net { }

traffic_rule {
	ip_family: IPV6
	proto: UDP
	action: DROP
}

exec_bin {
	path: "/bin/bash"
	arg0: "sh"
	arg: "-i"
}
