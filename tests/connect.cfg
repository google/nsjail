name: "connect_test"
description: "Test for HTTP CONNECT proxy redirection."

mode: ONCE

skip_setsid: true
mount_proc: true

mount {
	src: "/"
	dst: "/"
	is_bind: true
}

mount {
	src_content: "nameserver 8.8.8.8\nnameserver 1.1.1.1\n"
	dst: "/etc/resolv.conf"
}

user_net {
	backend: NSTUN

	rule4 {
		proto: ICMP
		action: REDIRECT
		redirect_ip: "127.0.0.2"
	}
	rule4 {
		proto: TCP
		action: ENCAP_CONNECT
		redirect_ip: "127.0.0.1"
		redirect_port: 3128
	}
	rule6 {
		proto: TCP
		action: ENCAP_CONNECT
		redirect_ip: "127.0.0.1"
		redirect_port: 3128
	}
}

exec_bin {
	path: "/bin/bash"
	arg: "-i"
}
