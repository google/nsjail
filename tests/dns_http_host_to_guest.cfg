name: "dns_http_host_to_guest"
description: "Test for HOST_TO_GUEST proxy redirection."

mode: ONCE
time_limit: 30
envar: "PATH=/usr/bin:/bin:/usr/sbin:/sbin"
keep_caps: true

mount {
	src: "/"
	dst: "/"
	is_bind: true
}

user_net {
	rule4 {
		direction: HOST_TO_GUEST
		action: REDIRECT
		proto: UDP
		dport: 53535
		redirect_port: 53535
	}
	rule4 {
		direction: HOST_TO_GUEST
		action: REDIRECT
		proto: TCP
		dport: 8080
		redirect_port: 8000
	}
	rule6 {
		direction: HOST_TO_GUEST
		action: REDIRECT
		proto: TCP
		dport: 8081
		redirect_port: 8000
	}
}

exec_bin {
	path: "/usr/bin/python3"
	arg: "-m"
	arg: "http.server"
	arg: "8000"
}
