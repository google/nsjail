name: "socks5_test"
description: "Test for SOCKS5 proxy redirection."

mode: ONCE

skip_setsid: true
mount_proc: true

mount {
	src: "/"
	dst: "/"
	is_bind: true
}

mount {
	src_content: "nameserver 8.8.8.8\nnameserver 1.1.1.1\n"
	dst: "/etc/resolv.conf"
}

user_net {
	use_nstun: true

	nstun_rule {
		proto: ICMP
		action: REDIRECT
		redirect_ip: "127.0.0.2"
	}
	nstun_rule {
		proto: TCP
		action: ENCAP_SOCKS5
		redirect_ip: "127.0.0.1"
		redirect_port: 1080
	}
	nstun_rule {
		proto: UDP
		action: ENCAP_SOCKS5
		redirect_ip: "127.0.0.1"
		redirect_port: 1080
	}
}

exec_bin {
	path: "/bin/bash"
	arg0: "sh"
	arg: "-c"
	arg: "nc -v -z -w 2 1.1.1.1 80 || exit 77"
}
